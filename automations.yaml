- id: '1751213041695'
  alias: เปิดไฟหน้าบ้าน
  description: เปิดไฟกลางบ้านเมื่อ drydream หรือ rella_naey กลับบ้านช่วงกลางคืน
  triggers:
  - entity_id:
    - person.drydream
    from:
    to: home
    trigger: state
  - entity_id:
    - person.rella_naey
    from:
    to: home
    trigger: state
  conditions:
  - condition: time
    after: '18:00:00'
    before: 06:00:00
    weekday:
    - sun
    - mon
    - tue
    - wed
    - thu
    - fri
    - sat
  actions:
  - target:
      entity_id: switch.aifaethwlaangh_ngnangeln_l2
    action: switch.turn_on
    data: {}
  - delay: 00:05:00
  - target:
      entity_id: switch.aifaethwlaangh_ngnangeln_l2
    action: switch.turn_off
    data: {}
  mode: single
