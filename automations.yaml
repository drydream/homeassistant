- id: '1755656000001'
  alias: ห้องน้ำ L1 → L2 ดีเลย์ 1 วิ
  mode: restart
  trigger:
  - platform: state
    entity_id: switch.h_ngnmaa_l1
    to:
    - 'on'
    - 'off'
  condition:
  - condition: template
    value_template: '{{ states(''switch.h_ngnmaa_l2'') != trigger.to_state.state }}'
  action:
  - delay: 00:00:01
  - service: homeassistant.turn_{{ trigger.to_state.state }}
    target:
      entity_id: switch.h_ngnmaa_l2
