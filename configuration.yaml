  calendar_month_filter:
    name: "กรองตามเดือน"
    options:
      - "All"
      - "January"
      - "February"
      - "March"
      - "April"
      - "May"
      - "June"
      - "July"
      - "August"
      - "September"
      - "October"
      - "November"
      - "December"
    initial: "All"
    icon: mdi:calendar-month

# ===== Utility meters =====
utility_meter:
  electricity_cost_monthly:
    source: sensor.etaaaiffaa_energy_cost
    cycle: monthly

# ===== Lovelace =====
lovelace:
  mode: storage
  dashboards:
    dashboard-mylist:
      mode: yaml
      title: "My List"
      icon: mdi:format-list-bulleted
      show_in_sidebar: true
      filename: dashboards/mylist/mylist.yaml